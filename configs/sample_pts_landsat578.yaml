project:
  name: swiss_alps_lst
  output_dir: outputs/

# Area of interest: external GeoJSON file
aoi:
  xmin: 5.41
  xmax: 10.97
  ymin: 45.34
  ymax: 47.97
  crs: EPSG:4326  # WGS84 for GeoJSON

# Time range for the Landsat archive
time:
  start: "1984-01-01"
  end: "2022-12-31"

# Which Landsat sensors to include in the merged collection
sensors:
  use: ["L5", "L7", "L8"]

# Which bands to include
bands:
  optical:  ["Blue", "Green", "Red", "NIR", "SWIR1", "SWIR2"]

# Cloud masking and preprocessing settings
masking:
  cloud_bit: 3              # QA_PIXEL bit 3 = cloud
  cloud_confidence_bit: 9   # QA_PIXEL bit 9 = medium+ cloud confidence
  lst_min_celsius: -60      # physical lower bound for LST
  lst_max_celsius: 60       # physical upper bound for LST
  remove_overlap: false      # remove pixels duplicated across adjacent scenes
  apply_cloud_mask: false   # false = export all LST + cloud flag

# Harmonic regression model settings
model:
  type: harmonic
  target_band: SurfT         # the band we are fitting the model to
  harmonics: 1               # number of harmonic cycles (1 = annual cycle)
  time_origin: "1970-01-01"  # reference date for time variable t
  include_trend: true        # include a linear trend component (b1)

# Export settings
export:
  destination: drive    # 'drive' or 'asset'
  folder: EE_LST_timeseries
  scale: 30             # Landsat native resolution in metres
  crs: EPSG:32632
  max_pixels: 1000000000000
  products:
    malst: true
    trend: true
    amplitude: true
    phase: true
    rmse: true
    counts: true
    std: true
    variance: true
    b0_raw: true
    b1_raw: true
    b2_raw: true
    b3_raw: true
